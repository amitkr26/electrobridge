name: Backend Keep-Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://electrobridge-api.onrender.com/health)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
